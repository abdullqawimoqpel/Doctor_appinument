<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Review Submission - MediBook</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline-variant": "#c6c6cd",
                        "surface-variant": "#d3e4fe",

                        "on-primary-container": "#7c839b",
                        "on-surface-variant": "#45464d",
                        "surface-container": "#e5eeff",
                        "tertiary-fixed": "#e0e3e5",
                        "on-secondary-fixed-variant": "#005049",
                        "surface-bright": "#f8f9ff",
                        "secondary-fixed": "#89f5e7",
                        "tertiary-fixed-dim": "#c4c7c9",
                        "on-tertiary-container": "#818486",
                        "primary": "#000000",
                        "secondary": "#006a61",
                        "secondary-container": "#86f2e4",
                        "tertiary-container": "#191c1e",
                        "surface": "#f8f9ff",
                        "tertiary": "#000000",
                        "secondary-fixed-dim": "#6bd8cb",
                        "on-error": "#ffffff",
                        "inverse-surface": "#213145",
                        "error": "#ba1a1a",
                        "inverse-on-surface": "#eaf1ff",
                        "on-tertiary": "#ffffff",
                        "primary-fixed": "#dae2fd",
                        "surface-container-highest": "#d3e4fe",
                        "outline": "#76777d",
                        "on-error-container": "#93000a",
                        "primary-container": "#131b2e",
                        "surface-tint": "#565e74",
                        "inverse-primary": "#bec6e0",
                        "surface-container-lowest": "#ffffff",
                        "surface-dim": "#cbdbf5",
                        "on-surface": "#0b1c30",
                        "surface-container-low": "#eff4ff",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed": "#191c1e",
                        "on-primary-fixed": "#131b2e",
                        "on-secondary-fixed": "#00201d",
                        "on-tertiary-fixed-variant": "#444749",
                        "surface-container-high": "#dce9ff",
                        "on-primary-fixed-variant": "#3f465c",
                        "primary-fixed-dim": "#bec6e0",
                        "on-secondary": "#ffffff",
                        "on-background": "#0b1c30",
                        "on-secondary-container": "#006f66"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "1.5rem",
                        "stack-sm": "0.5rem",
                        "margin-mobile": "1rem",
                        "stack-lg": "2rem",
                        "stack-md": "1rem",
                        "container-max": "1280px",
                        "margin-desktop": "2.5rem"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "body-sm": ["Inter"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "label-sm": ["Inter"],
                        "headline-xl": ["Plus Jakarta Sans"],

                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}]

                }
            }
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md">
<!-- TopNavBar (Suppressed for transactional flow, but keeping basic header for context) -->
<header class="bg-surface-container-lowest shadow-sm flex justify-between items-center w-full px-gutter py-4 sticky top-0 z-50">
<div class="flex items-center gap-2">
<button aria-label="Go back" class="text-on-surface-variant hover:bg-surface-container-low p-2 rounded-full transition-colors duration-200 ease-in-out">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="text-headline-md font-headline-md text-primary">MediBook</div>
</div>
<div class="font-label-md text-label-md text-primary cursor-pointer hover:bg-surface-container-low p-2 rounded-full transition-colors duration-200 ease-in-out">
<span class="material-symbols-outlined">close</span>
</div>
</header>
<main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop">
<div class="w-full max-w-2xl bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant p-gutter md:p-stack-lg">
<div class="text-center mb-stack-lg">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-stack-sm">How was your visit?</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Your feedback helps us improve our care and services.</p>
</div>
<!-- Doctor Info Card -->
<div class="flex items-center gap-4 bg-surface-container-low p-4 rounded-lg mb-stack-lg border border-surface-variant">
<img alt="Doctor Avatar" class="w-16 h-16 rounded-full object-cover shadow-sm" data-alt="A professional headshot of a friendly female doctor in a modern, brightly lit clinical setting. She wears a clean white coat over a light blue shirt, exuding assurance and clarity. The lighting is soft and even, highlighting a trustworthy expression. The background is a slightly out-of-focus, sterile but welcoming hospital corridor." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCugDASHKPitGruATCb4HXMctjkwZotoFzFnYJHYKrF9dR4iYk2WO-r5jQ9EZOowu3ukrcXqObesnUKfo04afLH4GCpLc8UpNGszZz8jAGjYPP6P1pBrI_uuNcU1tiHw8vJ9RqId7dmbcN3IbMTsj4P7C2N1ie9lM1y-0htFjafmpdMi7St5fbUdFHUVa51JYZhcbwgQJ3ODn5Ajw99e_93mBSD8yPQ6_BMsjtHn4d5RJ3TbHcDhBKZEmYiAOhE1UwhFifqMjFdnQ"/>
<div>
<h2 class="font-headline-sm text-headline-sm text-on-surface">Dr. Sarah Jenkins</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Cardiology Consultation • Oct 24, 2023</p>
</div>
</div>
<form action="#" method="POST">
<!-- Rating Section -->
<div class="mb-stack-lg text-center">
<label class="block font-label-md text-label-md text-on-surface mb-stack-sm">Overall Rating</label>
<div class="flex justify-center gap-2">
<!-- Star 1 -->
<button aria-label="Rate 1 star" class="text-outline hover:text-secondary transition-colors" type="button">
<span class="material-symbols-outlined text-4xl filled text-secondary">star</span>
</button>
<!-- Star 2 -->
<button aria-label="Rate 2 stars" class="text-outline hover:text-secondary transition-colors" type="button">
<span class="material-symbols-outlined text-4xl filled text-secondary">star</span>
</button>
<!-- Star 3 -->
<button aria-label="Rate 3 stars" class="text-outline hover:text-secondary transition-colors" type="button">
<span class="material-symbols-outlined text-4xl filled text-secondary">star</span>
</button>
<!-- Star 4 -->
<button aria-label="Rate 4 stars" class="text-outline hover:text-secondary transition-colors" type="button">
<span class="material-symbols-outlined text-4xl filled text-secondary">star</span>
</button>
<!-- Star 5 -->
<button aria-label="Rate 5 stars" class="text-outline hover:text-secondary transition-colors" type="button">
<span class="material-symbols-outlined text-4xl">star</span>
</button>
</div>
</div>
<!-- Tags Section -->
<div class="mb-stack-lg">
<label class="block font-label-md text-label-md text-on-surface mb-stack-sm">What stood out? (Optional)</label>
<div class="flex flex-wrap gap-2">
<label class="cursor-pointer">
<input class="peer sr-only" name="tags" type="checkbox" value="Punctuality"/>
<div class="px-4 py-2 rounded-full border border-outline-variant font-body-sm text-body-sm text-on-surface-variant peer-checked:bg-secondary-container peer-checked:text-on-secondary-container peer-checked:border-secondary transition-all">
                                Punctuality
                            </div>
</label>
<label class="cursor-pointer">
<input checked="" class="peer sr-only" name="tags" type="checkbox" value="Bedside Manner"/>
<div class="px-4 py-2 rounded-full border border-outline-variant font-body-sm text-body-sm text-on-surface-variant peer-checked:bg-secondary-container peer-checked:text-on-secondary-container peer-checked:border-secondary transition-all">
                                Bedside Manner
                            </div>
</label>
<label class="cursor-pointer">
<input checked="" class="peer sr-only" name="tags" type="checkbox" value="Clear Communication"/>
<div class="px-4 py-2 rounded-full border border-outline-variant font-body-sm text-body-sm text-on-surface-variant peer-checked:bg-secondary-container peer-checked:text-on-secondary-container peer-checked:border-secondary transition-all">
                                Clear Communication
                            </div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="tags" type="checkbox" value="Facility Cleanliness"/>
<div class="px-4 py-2 rounded-full border border-outline-variant font-body-sm text-body-sm text-on-surface-variant peer-checked:bg-secondary-container peer-checked:text-on-secondary-container peer-checked:border-secondary transition-all">
                                Facility Cleanliness
                            </div>
</label>
</div>
</div>
<!-- Text Area Section -->
<div class="mb-stack-lg">
<label class="block font-label-md text-label-md text-on-surface mb-stack-sm" for="experience">Share your experience</label>
<textarea class="w-full rounded-lg border border-outline-variant bg-surface-container-lowest px-4 py-3 font-body-md text-body-md text-on-surface focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all resize-none placeholder-on-surface-variant" id="experience" name="experience" placeholder="Tell us more about your visit..." rows="4"></textarea>
</div>
<!-- Action Buttons -->
<div class="flex flex-col sm:flex-row gap-4 mt-stack-lg">
<button class="flex-1 py-3 px-6 rounded-lg border border-outline-variant font-label-md text-label-md text-on-surface hover:bg-surface-container-low transition-colors" type="button">
                        Skip for now
                    </button>
<button class="flex-1 py-3 px-6 rounded-lg bg-primary font-label-md text-label-md text-on-primary hover:bg-on-surface-variant transition-colors shadow-sm" type="submit">
                        Submit Feedback
                    </button>
</div>
</form>
</div>
</main>
<!-- Footer (Simplified for transactional flow) -->
<footer class="bg-surface-container-high py-stack-md px-gutter text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">© 2024 MediBook Health. Assurance through Clarity.</p>
</footer>
</body></html>
